query Web_GetHoldings($input: PortfolioInput) {
  portfolio(input: $input) {
    aggregateHoldings {
      edges {
        node {
          id
          quantity
          basis
          totalValue
          holdings {
            id
            type
            name
            ticker
            closingPrice
            isManual
          }
          security {
            id
            name
            type
            ticker
            currentPrice
            currentPriceUpdatedAt
          }
        }
      }
    }
  }
}
